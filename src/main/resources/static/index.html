<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Library Management System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Library Management System</h1>

    <div class="top-bar">
        <label for="searchInput"></label><input type="text" id="searchInput" placeholder="Search books by title or author..." oninput="handleSearchInput()">
        <div id="suggestions"></div>
    </div>

    <div class="books-section">

        <h2>Books</h2>

        <button onclick="getBooks()">Load All Books</button>

        <div id="booksContainer"></div>
        <div id="pagination"></div>

    </div>

    <hr>

    <div class="form-section">

        <h2>Add New Book</h2>

        <label for="title"></label><input type="text" id="title" placeholder="Book Title">

        <label for="author"></label><input type="text" id="author" placeholder="Author Name">

        <input type="text" id="isbn" placeholder="ISBN">

        <label for="category"></label><input type="text" id="category" placeholder="Category">

        <label for="totalCopies"></label><input type="number" id="totalCopies" placeholder="Total Copies">

        <label for="availableCopies"></label><input type="number" id="availableCopies" placeholder="Available Copies">

        <input type="number" id="publishedYear" placeholder="Published Year">

        <button onclick="addBook()">Add Book</button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
